name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Backend syntax check
        run: npm run lint --workspace backend
      - name: Backend tests
        run: npm test --workspace backend

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Frontend lint
        run: npm run lint --workspace frontend
      - name: Frontend build
        run: npm run build --workspace frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
